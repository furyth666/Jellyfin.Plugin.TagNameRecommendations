name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.TagNameRecommendations.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.TagNameRecommendations.sln --configuration Release --no-restore

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.TagNameRecommendations
          path: |
            Jellyfin.Plugin.TagNameRecommendations/bin/Release/net8.0/Jellyfin.Plugin.TagNameRecommendations.dll
            Jellyfin.Plugin.TagNameRecommendations/bin/Release/net8.0/SQLitePCL.pretty.dll
            build.yaml
          if-no-files-found: error
